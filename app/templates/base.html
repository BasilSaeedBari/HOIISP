<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HOIISP{% endblock %} - Habib Open Innovation & Independent Study Platform</title>
    <!-- Sakura.css via CDN -->
    <link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura.css" type="text/css">
    <!-- Custom tweaks -->
    <style>
        .error { color: #d9534f; }
        .success { color: #5cb85c; }
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .badge.active { background: #d4edda; color: #155724; }
        .badge.archived { background: #e2e3e5; color: #383d41; }
        .badge.stale { background: #fff3cd; color: #856404; }
        .header-nav { display: flex; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .header-nav a { text-decoration: none; }
        .progress-container { width: 100%; background: #eee; height: 20px; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: #0078D7; transition: width 0.3s; }
    </style>
    <script src="/static/app.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <header>
        <h1><a href="/" style="text-decoration:none; color:inherit;">HOIISP</a></h1>
        <nav class="header-nav">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/faculty">Faculty</a>
            <a href="/submit">Submit Project</a>
            {% if request.session.get("admin_logged_in") %}
            <a href="/admin"><b>Admin Panel</b></a>
            <form action="/api/admin/logout" method="post" style="display:inline;">
                <button type="submit" style="padding:2px 8px; font-size:0.9em;">Logout</button>
            </form>
            {% endif %}
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <hr>
    <footer>
        <p>
            <a href="/terms">Terms & Conditions</a> | 
            <a href="/faculty">Faculty Directory</a> | 
            Contact: <a href="mailto:hoiisp@habib.edu.pk">hoiisp@habib.edu.pk</a>
        </p>
    </footer>
</body>
</html>
