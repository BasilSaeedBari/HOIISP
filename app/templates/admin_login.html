{% extends "base.html" %}

{% block title %}Admin Login{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 50px auto; border: 1px solid #ccc; padding: 20px; border-radius: 5px;">
    <h2>Admin Login</h2>
    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/api/admin/login" method="post">
        <label>Email</label><br>
        <input type="email" name="email" required style="width: 100%;"><br><br>

        <label>Password</label><br>
        <input type="password" name="password" required style="width: 100%;"><br><br>

        <button type="submit" style="width: 100%;">Login</button>
    </form>
</div>
{% endblock %}
